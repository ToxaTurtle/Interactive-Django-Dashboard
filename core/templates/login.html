<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .error { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold mb-8 text-center text-gray-800">Вход в систему</h2>

        <form id="loginForm">
            <div class="mb-5">
                <label class="block text-gray-700 text-sm font-medium mb-1">Имя пользователя</label>
                <input type="text" id="username"
                       class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition"
                       required autocomplete="username">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-medium mb-1">Пароль</label>
                <input type="password" id="password"
                       class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition"
                       required autocomplete="current-password">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium transition">
                Войти
            </button>
        </form>

        <p id="message" class="mt-6 text-center text-red-500 font-medium hidden"></p>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api/v1';

        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/token/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = '/dashboard/';
                } else {
                    showError(data.detail || 'Неверный логин или пароль');
                }
            } catch (err) {
                showError('Не удалось подключиться к серверу');
            }
        });

        function showError(text) {
            message.textContent = text;
            message.classList.remove('hidden');
            message.classList.add('error');
        }
    </script>
</body>
</html>

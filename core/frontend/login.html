<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Вход в систему</h2>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700">Имя пользователя</label>
                <input type="text" id="username" class="w-full p-2 border rounded mt-1" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700">Пароль</label>
                <input type="password" id="password" class="w-full p-2 border rounded mt-1" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Войти</button>
        </form>
        <p id="message" class="mt-4 text-center text-red-500 hidden"></p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/token/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = 'dashboard.html'; // Переход на дашборд
                } else {
                    message.textContent = 'Ошибка: Неверный логин или пароль';
                    message.classList.remove('hidden');
                }
            } catch (err) {
                message.textContent = 'Сервер недоступен';
                message.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>

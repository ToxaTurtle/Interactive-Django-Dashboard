<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Аналитика продаж</h1>
            <div class="flex items-center gap-4">
                <span id="userInfoLabel" class="text-sm text-gray-600 bg-white px-4 py-2 rounded-lg shadow font-medium">
                    Загрузка профиля...
                </span>
                <button id="logoutBtn"
                        class="bg-red-500 text-white px-5 py-2 rounded-lg hover:bg-red-600 transition font-medium">
                    Выйти
                </button>
            </div>
        </div>

        <!-- Карточки статистики -->
        <div id="statsCards" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500 text-sm">Общая выручка</p>
                <h3 id="totalRevenue" class="text-3xl font-bold text-gray-800 mt-1">0 ₽</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500 text-sm">Всего продаж</p>
                <h3 id="totalSales" class="text-3xl font-bold text-gray-800 mt-1">0</h3>
            </div>
        </div>

        <!-- Панель управления -->
        <div class="bg-white p-5 rounded-xl shadow mb-8 flex gap-4 items-center flex-wrap">
            <select id="sortField" onchange="renderTableAndStats()"
                    class="border border-gray-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-500">
                <option value="-created_at">Дата (свежие)</option>
                <option value="created_at">Дата (старые)</option>
                <option value="quantity">Количество</option>
                <option value="product_name">Название товара (А-Я)</option>
                <option value="-total_price">Сумма (убыв.)</option>
                <option value="total_price">Сумма (возр.)</option>
            </select>

            <select id="managerSelect" onchange="selectManagerDropdown(this.value)"
                    class="border border-gray-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-500 hidden">
                <option value="">Все менеджеры</option>
            </select>

            <button onclick="resetFilters()"
                    class="bg-gray-500 text-white px-5 py-2.5 rounded-lg hover:bg-gray-600 transition">
                Сбросить фильтры
            </button>
        </div>

        <!-- Графики -->
        <div id="chartsGrid" class="grid grid-cols-1 gap-8 mb-8">
            <div id="categoryChartContainer" class="bg-white p-6 rounded-xl shadow">
                <h2 class="text-lg font-bold mb-2">Продажи по категориям</h2>
                <p class="text-xs text-gray-400 mb-4">* Нажмите на сектор для фильтрации</p>
                <canvas id="categoryChart" height="120"></canvas>
            </div>
            <div id="managerChartContainer" class="bg-white p-6 rounded-xl shadow hidden">
                <h2 class="text-lg font-bold mb-2">Вклад менеджеров</h2>
                <p class="text-xs text-gray-400 mb-4">* Нажмите на сектор для фильтрации</p>
                <canvas id="managerChart" height="120"></canvas>
            </div>
        </div>

        <!-- Таблица -->
        <div class="bg-white p-6 rounded-xl shadow">
            <div class="flex justify-between items-center mb-5">
                <div class="flex items-center gap-3">
                    <h2 id="tableTitle" class="text-xl font-bold">Операции</h2>
                    <span id="activeFiltersLabel"
                          class="bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full hidden"></span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b text-gray-500">
                            <th class="pb-3 text-left">Дата</th>
                            <th class="pb-3 text-left">Товар</th>
                            <th class="pb-3 text-left">Кол-во</th>
                            <th id="managerHeader" class="pb-3 text-left hidden">Менеджер</th>
                            <th class="pb-3 text-left">Сумма</th>
                        </tr>
                    </thead>
                    <tbody id="salesTable" class="text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api/v1';
        const token = localStorage.getItem('access_token');
        let currentUser = null;

        let categoryChartInstance = null;
        let managerChartInstance = null;

        let allSales = [];
        let clientFilterCategory = '';
        let clientFilterManager = '';

        async function fetchUserProfileAndSetup() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/sales/users/me/`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return;
                }

                currentUser = await res.json();
                document.getElementById('userInfoLabel').textContent =
                    `Пользователь: ${currentUser.username} (${currentUser.role})`;

                setupRoleBasedUI();
                await loadInitialData();
            } catch (e) {
                console.error('Ошибка загрузки профиля:', e);
                document.getElementById('userInfoLabel').textContent = 'Ошибка авторизации';
            }
        }

        function setupRoleBasedUI() {
            const isAdmin = currentUser.role === 'ADMIN' || currentUser.is_superuser;

            if (isAdmin) {
                document.getElementById('managerSelect').classList.remove('hidden');
                document.getElementById('managerChartContainer').classList.remove('hidden');
                document.getElementById('managerHeader').classList.remove('hidden');
                document.getElementById('chartsGrid').className = "grid grid-cols-1 md:grid-cols-2 gap-8 mb-8";
                loadManagersList();
            } else {
                document.getElementById('chartsGrid').className = "grid grid-cols-1 max-w-2xl mx-auto gap-8 mb-8";
            }
        }

        async function loadManagersList() {
            try {
                const res = await fetch(`${API_BASE}/sales/users/`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const users = await res.json();
                const select = document.getElementById('managerSelect');
                users.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.username;
                    opt.textContent = u.username;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('Ошибка загрузки менеджеров:', e);
            }
        }

        async function loadInitialData() {
            try {
                const [statsRes, salesRes] = await Promise.all([
                    fetch(`${API_BASE}/sales/sales/analytics/`, { headers: { 'Authorization': 'Bearer ' + token } }),
                    fetch(`${API_BASE}/sales/sales/`, { headers: { 'Authorization': 'Bearer ' + token } })
                ]);

                const stats = await statsRes.json();
                allSales = await salesRes.json();

                renderCharts(stats);
                renderTableAndStats();
            } catch (err) {
                console.error("Ошибка загрузки данных:", err);
            }
        }

        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

        function getColorForCategory(name) {
            if (!window.categoryColors) window.categoryColors = {};
            if (!window.categoryColors[name]) {
                window.categoryColors[name] = COLORS[Object.keys(window.categoryColors).length % COLORS.length];
            }
            return window.categoryColors[name];
        }

        function renderCharts(stats) {
            if (categoryChartInstance) categoryChartInstance.destroy();

            categoryChartInstance = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: stats.by_category.map(c => c.product__category__name),
                    datasets: [{
                        data: stats.by_category.map(c => c.revenue),
                        backgroundColor: stats.by_category.map(c => getColorForCategory(c.product__category__name))
                    }]
                },
                options: {
                    responsive: true,
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const label = categoryChartInstance.data.labels[elements[0].index];
                            clientFilterCategory = (clientFilterCategory === label) ? '' : label;
                            renderTableAndStats();
                        }
                    }
                }
            });

            const isAdmin = currentUser.role === 'ADMIN' || currentUser.is_superuser;
            if (isAdmin && stats.by_manager) {
                if (managerChartInstance) managerChartInstance.destroy();

                managerChartInstance = new Chart(document.getElementById('managerChart'), {
                    type: 'pie',
                    data: {
                        labels: stats.by_manager.map(m => m.manager__username),
                        datasets: [{
                            data: stats.by_manager.map(m => m.revenue),
                            backgroundColor: ['#60a5fa', '#34d399', '#fbbf24', '#f87171']
                        }]
                    },
                    options: {
                        responsive: true,
                        onClick: (e, elements) => {
                            if (elements.length > 0) {
                                const label = managerChartInstance.data.labels[elements[0].index];
                                clientFilterManager = (clientFilterManager === label) ? '' : label;
                                document.getElementById('managerSelect').value = clientFilterManager;
                                renderTableAndStats();
                            }
                        }
                    }
                });
            }
        }

        function selectManagerDropdown(username) {
            clientFilterManager = username;
            renderTableAndStats();
        }

        function renderTableAndStats() {
            let filtered = [...allSales];
            const isAdmin = currentUser.role === 'ADMIN' || currentUser.is_superuser;

            if (clientFilterCategory) {
                filtered = filtered.filter(s => s.product_name?.toLowerCase().includes(clientFilterCategory.toLowerCase()));
            }
            if (isAdmin && clientFilterManager) {
                filtered = filtered.filter(s => s.manager_name === clientFilterManager);
            }

            const sortField = document.getElementById('sortField').value;
            filtered.sort((a, b) => {
                if (sortField === '-created_at') return new Date(b.created_at) - new Date(a.created_at);
                if (sortField === 'created_at') return new Date(a.created_at) - new Date(b.created_at);
                if (sortField === 'quantity') return b.quantity - a.quantity;
                if (sortField === 'product_name') return a.product_name.localeCompare(b.product_name);
                if (sortField === '-total_price') return parseFloat(b.total_price) - parseFloat(a.total_price);
                if (sortField === 'total_price') return parseFloat(a.total_price) - parseFloat(b.total_price);
                return 0;
            });

            const totalRevenue = filtered.reduce((sum, s) => sum + parseFloat(s.total_price || 0), 0);
            document.getElementById('totalRevenue').textContent = `${totalRevenue.toLocaleString('ru-RU')} ₽`;
            document.getElementById('totalSales').textContent = filtered.length;

            const tbody = document.getElementById('salesTable');
            tbody.innerHTML = filtered.map(s => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="py-3 text-gray-500">${s.created_at.split('T')[0]}</td>
                    <td class="py-3 font-medium">${s.product_name}</td>
                    <td class="py-3">${s.quantity}</td>
                    ${isAdmin ? `<td class="py-3 text-blue-600 font-medium">${s.manager_name || '-'}</td>` : ''}
                    <td class="py-3 font-semibold">${Number(s.total_price).toLocaleString('ru-RU')} ₽</td>
                </tr>
            `).join('');

            // Активные фильтры
            const label = document.getElementById('activeFiltersLabel');
            const filters = [];
            if (clientFilterCategory) filters.push(`Категория: ${clientFilterCategory}`);
            if (isAdmin && clientFilterManager) filters.push(`Менеджер: ${clientFilterManager}`);

            if (filters.length) {
                label.textContent = filters.join(' | ');
                label.classList.remove('hidden');
            } else {
                label.classList.add('hidden');
            }
        }

        function resetFilters() {
            clientFilterCategory = '';
            clientFilterManager = '';
            document.getElementById('sortField').value = '-created_at';
            const select = document.getElementById('managerSelect');
            if (select) select.value = '';
            renderTableAndStats();
        }

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear();
            window.location.href = 'login.html';
        };
        fetchUserProfileAndSetup();
    </script>
</body>
</html>
